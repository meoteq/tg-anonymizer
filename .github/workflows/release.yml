name: Release

on:
  push:
    tags:
      - 'v*' # Triggers the workflow only when you push a version tag (e.g. v0.2.0)

permissions:
  contents: write

jobs:
  build:
    name: Build - ${{ matrix.platform.os }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      matrix:
        platform:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin_name: tg-anonymizer
            asset_name: tg-anonymizer-linux-x64.AppImage
          - os: macos-latest
            target: x86_64-apple-darwin
            bin_name: tg-anonymizer
            asset_name: tg-anonymizer-macos-x64.zip
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_name: tg-anonymizer.exe
            asset_name: tg-anonymizer-windows-x64.exe

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Install Linux dependencies
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev libgtk-3-dev file

      - name: Build binary
        run: cargo build --release --target ${{ matrix.platform.target }}

      - name: Package AppImage (Linux only)
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          # Create AppDir structure
          mkdir -p AppDir/usr/bin
          cp target/${{ matrix.platform.target }}/release/tg-anonymizer AppDir/usr/bin/
          cp resources/tg-anonymizer.desktop AppDir/
          cp resources/tg-anonymizer.png AppDir/
          ln -s usr/bin/tg-anonymizer AppDir/AppRun
          chmod +x AppDir/AppRun
          
          # Download and run appimagetool
          wget https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          export APPIMAGE_EXTRACT_AND_RUN=1
          ./appimagetool-x86_64.AppImage AppDir ${{ matrix.platform.asset_name }}

      - name: Package ZIP (macOS only)
        if: matrix.platform.os == 'macos-latest'
        run: |
          cd target/${{ matrix.platform.target }}/release
          zip -r ../../../${{ matrix.platform.asset_name }} ${{ matrix.platform.bin_name }}

      - name: Package Windows EXE
        if: matrix.platform.os == 'windows-latest'
        shell: bash
        run: |
          cp target/${{ matrix.platform.target }}/release/${{ matrix.platform.bin_name }} ${{ matrix.platform.asset_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.asset_name }}
          path: ${{ matrix.platform.asset_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten directory structure
        run: |
          mkdir dist
          find artifacts -type f -exec mv {} dist/ \;
          ls -la dist/

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
